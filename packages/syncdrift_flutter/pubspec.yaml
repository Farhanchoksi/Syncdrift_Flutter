name: syncdrift_flutter
description: A modern offline-first reactive database framework built on top of Drift. Ships with SWR caching, offline sync queue, real-time push, and file storage — in one package.
version: 0.1.1
homepage: https://github.com/Farhanchoksi/Syncdrift_Flutter
repository: https://github.com/Farhanchoksi/Syncdrift_Flutter
issue_tracker: https://github.com/Farhanchoksi/Syncdrift_Flutter/issues


environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  drift: ">=2.20.0 <3.0.0"
  sqlite3_flutter_libs: ">=0.5.24 <0.7.0"
  riverpod: ">=2.5.1 <4.0.0"
  rxdart: ">=0.27.7 <0.29.0"
  connectivity_plus: ">=6.0.3 <8.0.0"
  http: ^1.2.0
  http_parser: ^4.0.2
  web_socket_channel: ^3.0.1
  supabase: ^2.6.0
  path: ^1.9.0
  path_provider: ^2.1.3
  syncdrift_annotations: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.20.0
  build_runner: ^2.4.9
