name: syncdrift_generator
description: Build runner code generator for syncdrift_flutter. Auto-generates typed repositories, relationship loaders, and Riverpod providers from annotated Drift tables.
version: 0.1.0
homepage: https://github.com/Farhanchoksi/Syncdrift_Flutter
repository: https://github.com/Farhanchoksi/Syncdrift_Flutter
issue_tracker: https://github.com/Farhanchoksi/Syncdrift_Flutter/issues


environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  analyzer: ">=6.4.1 <14.0.0"
  build: ">=2.4.1 <5.0.0"
  source_gen: ">=1.5.0 <5.0.0"
  code_builder: ^4.10.0
  dart_style: ">=2.3.6 <4.0.0"
  syncdrift_annotations: ^0.1.0

dev_dependencies:
  build_test: ^2.2.2
  test: ^1.25.2
